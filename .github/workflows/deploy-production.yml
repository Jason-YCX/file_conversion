name: Deploy production

on:
  workflow_dispatch:

concurrency:
  group: qingzhuan-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static checks
        run: npm run lint

      - name: Run tests
        run: npm test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure production SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/qingzhuan_production
          chmod 600 ~/.ssh/qingzhuan_production
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on production server
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT }}
        run: |
          ssh \
            -i ~/.ssh/qingzhuan_production \
            -p "${PRODUCTION_PORT:-22}" \
            "$PRODUCTION_USER@$PRODUCTION_HOST" \
            'cd /opt/qingzhuan && ./scripts/deploy.sh'
