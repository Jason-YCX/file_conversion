name: Deploy production

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Rebuild both images even when source paths are unchanged
        required: false
        default: false
        type: boolean

concurrency:
  group: qingzhuan-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FFMPEG_BINARIES_URL: https://cdn.npmmirror.com/binaries/ffmpeg-static
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run static checks
        run: npm run lint

      - name: Run tests
        run: npm test

  release:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      TCR_REGISTRY: ${{ vars.TCR_REGISTRY }}
      TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE }}
      WEB_IMAGE: ${{ vars.WEB_IMAGE }}
      BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE }}
      DOCKER_PLATFORM: ${{ vars.DOCKER_PLATFORM }}
      PRODUCTION_API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
      PRODUCTION_PROJECT_DIR: ${{ vars.PRODUCTION_PROJECT_DIR }}
      FFMPEG_BINARIES_URL: https://cdn.npmmirror.com/binaries/ffmpeg-static
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release configuration
        run: |
          required=(
            TCR_REGISTRY
            TCR_NAMESPACE
            WEB_IMAGE
            BACKEND_IMAGE
            DOCKER_PLATFORM
            PRODUCTION_API_BASE_URL
            PRODUCTION_PROJECT_DIR
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "Missing production environment variable: ${name}" >&2
              exit 1
            fi
          done

      - name: Configure production SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/github_actions_production
          chmod 600 ~/.ssh/github_actions_production
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Detect production image changes
        id: changes
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          base_sha=""
          web_changed=true
          backend_changed=true

          if [[ "$FORCE_REBUILD" == "true" ]]; then
            echo "Full image rebuild requested manually."
          else
            printf -v current_release_command \
              'cd %q && { cat .deploy/current 2>/dev/null || true; }' \
              "$PRODUCTION_PROJECT_DIR"
            base_sha="$(
              ssh \
                -i ~/.ssh/github_actions_production \
                -p "${PRODUCTION_PORT:-22}" \
                "$PRODUCTION_USER@$PRODUCTION_HOST" \
                "$current_release_command" |
                tr -d '[:space:]'
            )"

            if [[ "$base_sha" =~ ^[0-9a-f]{40}$ ]] && \
              git cat-file -e "${base_sha}^{commit}" 2>/dev/null && \
              git merge-base --is-ancestor "$base_sha" "$GITHUB_SHA"; then
              web_paths=(
                .dockerignore
                .github/workflows/deploy-production.yml
                .npmrc
                Dockerfile.web
                package.json
                package-lock.json
                apps/api/package.json
                app
                lib
                public
                worker
                next.config.ts
                vite.config.ts
                tsconfig.json
                postcss.config.mjs
              )
              backend_paths=(
                .dockerignore
                .github/workflows/deploy-production.yml
                .npmrc
                Dockerfile.backend
                package.json
                package-lock.json
                apps/api
              )

              if git diff --quiet "$base_sha" "$GITHUB_SHA" -- "${web_paths[@]}"; then
                web_changed=false
              fi
              if git diff --quiet "$base_sha" "$GITHUB_SHA" -- "${backend_paths[@]}"; then
                backend_changed=false
              fi
            else
              echo "No usable deployed ancestor was found; both images will be rebuilt."
              base_sha=""
            fi
          fi

          {
            echo "base_sha=$base_sha"
            echo "web_changed=$web_changed"
            echo "backend_changed=$backend_changed"
          } >> "$GITHUB_OUTPUT"
          echo "Production base: ${base_sha:-none}"
          echo "Web source changed: $web_changed"
          echo "Backend source changed: $backend_changed"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Tencent TCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Resolve web image
        id: web-image
        env:
          SOURCE_CHANGED: ${{ steps.changes.outputs.web_changed }}
          BASE_SHA: ${{ steps.changes.outputs.base_sha }}
          RELEASE: ${{ github.sha }}
        run: |
          build=true
          target="$TCR_REGISTRY/$TCR_NAMESPACE/$WEB_IMAGE:$RELEASE"

          if [[ "$SOURCE_CHANGED" == "false" ]]; then
            if docker buildx imagetools inspect "$target" >/dev/null 2>&1; then
              echo "Web image for this release already exists; reusing it."
              build=false
            else
              source="$TCR_REGISTRY/$TCR_NAMESPACE/$WEB_IMAGE:$BASE_SHA"
              if docker buildx imagetools create --tag "$target" "$source"; then
                echo "Web source is unchanged; copied the deployed image tag."
                build=false
              else
                echo "Unable to copy the deployed Web image; falling back to a rebuild."
              fi
            fi
          fi

          echo "build=$build" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        if: steps.web-image.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.web
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            FFMPEG_BINARIES_URL=${{ env.FFMPEG_BINARIES_URL }}
            NEXT_PUBLIC_API_BASE_URL=${{ env.PRODUCTION_API_BASE_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Resolve backend image
        id: backend-image
        env:
          SOURCE_CHANGED: ${{ steps.changes.outputs.backend_changed }}
          BASE_SHA: ${{ steps.changes.outputs.base_sha }}
          RELEASE: ${{ github.sha }}
        run: |
          build=true
          target="$TCR_REGISTRY/$TCR_NAMESPACE/$BACKEND_IMAGE:$RELEASE"

          if [[ "$SOURCE_CHANGED" == "false" ]]; then
            if docker buildx imagetools inspect "$target" >/dev/null 2>&1; then
              echo "Backend image for this release already exists; reusing it."
              build=false
            else
              source="$TCR_REGISTRY/$TCR_NAMESPACE/$BACKEND_IMAGE:$BASE_SHA"
              if docker buildx imagetools create --tag "$target" "$source"; then
                echo "Backend source is unchanged; copied the deployed image tag."
                build=false
              else
                echo "Unable to copy the deployed Backend image; falling back to a rebuild."
              fi
            fi
          fi

          echo "build=$build" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        if: steps.backend-image.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.backend
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          build-args: |
            FFMPEG_BINARIES_URL=${{ env.FFMPEG_BINARIES_URL }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Summarize image plan
        run: |
          base_sha="${{ steps.changes.outputs.base_sha }}"
          {
            echo "## Production image plan"
            echo "- Base release: ${base_sha:-none}"
            echo "- Web rebuilt: ${{ steps.web-image.outputs.build }}"
            echo "- Backend rebuilt: ${{ steps.backend-image.outputs.build }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy on production server
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT }}
          RELEASE: ${{ github.sha }}
        run: |
          # The command substitution is intentionally evaluated on the server.
          # shellcheck disable=SC2016
          printf -v remote_command \
            'cd %q && git diff --quiet && git diff --cached --quiet && git pull --ff-only && test "$(git rev-parse HEAD)" = %q && SKIP_GIT_PULL=1 APP_VERSION=%q ./scripts/deploy.sh' \
            "$PRODUCTION_PROJECT_DIR" \
            "$RELEASE" \
            "$RELEASE"
          ssh \
            -i ~/.ssh/github_actions_production \
            -p "${PRODUCTION_PORT:-22}" \
            "$PRODUCTION_USER@$PRODUCTION_HOST" \
            "$remote_command"
